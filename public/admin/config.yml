backend:
name: git-gateway
  branch: feature-cms
publish_mode: editorial_workflow
media_folder: "public/img/uploads"
public_folder: "/img/uploads"
collections:
  - name: "links"
    label: "Links"
    folder: "_posts/blog"
        create: true
        slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Url", name: "url", widget: "string"}
